# ──────────────────────────────────────────────────────────────────────────────
# Production Docker Compose — NO TLS variant
#
# Use this file when you do not yet have a domain name or TLS certificates.
# All traffic is served over plain HTTP on port 80.
#
# Prerequisites:
#   1. Copy .env.example → .env and fill in all values.
#      For this file, set:
#        VITE_API_BASE=http://<SERVER_IP>/api
#        CORS_ORIGINS=http://<SERVER_IP>
#      DOMAIN is not required.
#
#   2. Start all services:
#        docker compose -f docker-compose.prod-no-tls.yml up -d --build
#
# Upgrade path (when you obtain a domain + TLS certificate):
#   1. Run Certbot as described in docker-compose.prod.yml
#   2. Update .env: DOMAIN, VITE_API_BASE=https://..., CORS_ORIGINS=https://...
#   3. Switch to:  docker compose -f docker-compose.prod.yml up -d --build
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16
    container_name: saymed_db
    restart: always
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - saymed_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - saymed_net

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: saymed_redis
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - saymed_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saymed_net

  # ── API (Node.js / Express) ──────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: saymed_api
    restart: always
    env_file: .env
    environment:
      NODE_ENV: production
    volumes:
      - saymed_uploads:/app/uploads
      - saymed_transcripts:/app/transcripts
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    networks:
      - saymed_net

  # ── Frontend (React + Nginx static) ─────────────────────────────────────────
  # VITE_API_BASE is baked into the static bundle at build time.
  # Set it in .env as: VITE_API_BASE=http://<SERVER_IP>/api
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE: ${VITE_API_BASE}
    container_name: saymed_web
    restart: always
    depends_on:
      - api
    expose:
      - "80"
    networks:
      - saymed_net

  # ── Nginx reverse proxy (HTTP only, no TLS) ──────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: saymed_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      # Mounted directly — no envsubst template processing needed (no ${DOMAIN})
      - ./nginx/nginx.no-tls.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
    networks:
      - saymed_net

volumes:
  saymed_pg:
  saymed_redis:
  saymed_uploads:
  saymed_transcripts:

networks:
  saymed_net:
    driver: bridge
