# ──────────────────────────────────────────────────────────────────────────────
# Production Docker Compose
#
# Prerequisites:
#   1. Copy .env.example → .env and fill in all values
#   2. Obtain TLS certificates before starting (see TLS section in .env.example):
#        docker compose -f docker-compose.prod.yml run --rm certbot certonly \
#          --webroot --webroot-path=/var/www/certbot \
#          -d <DOMAIN> --email <EMAIL> --agree-tos --no-eff-email
#   3. Start all services:
#        docker compose -f docker-compose.prod.yml up -d
#   4. Set up a host cron for certificate renewal (runs every 12 h, no-op if not due):
#        0 0,12 * * * docker compose -f /path/to/docker-compose.prod.yml run --rm certbot renew --quiet && docker compose -f /path/to/docker-compose.prod.yml exec nginx nginx -s reload
#
# Upgrade notes:
#   - Backend migrations run automatically on container start (migrate → then start server).
#     If you need to run them manually: docker compose exec api node dist/migrate.js
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16
    container_name: saymed_db
    restart: always
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - saymed_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - saymed_net

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: saymed_redis
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - saymed_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saymed_net

  # ── API (Node.js / Express) ──────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: saymed_api
    restart: always
    env_file: .env
    environment:
      NODE_ENV: production
    volumes:
      # Persist audio uploads and generated transcripts outside the container
      - saymed_uploads:/app/uploads
      - saymed_transcripts:/app/transcripts
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    networks:
      - saymed_net

  # ── Frontend (React + Nginx static) ─────────────────────────────────────────
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE: ${VITE_API_BASE}
    container_name: saymed_web
    restart: always
    depends_on:
      - api
    expose:
      - "80"
    networks:
      - saymed_net

  # ── Nginx reverse proxy + TLS termination ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: saymed_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    environment:
      DOMAIN: ${DOMAIN}
      NGINX_ENVSUBST_TEMPLATE_SUFFIX: ".template"
    depends_on:
      - api
      - web
    networks:
      - saymed_net

  # ── Certbot (Let's Encrypt) ───────────────────────────────────────────────────
  # This service is used on-demand (docker compose run certbot ...).
  # It is NOT started with `up -d` because it exits after issuing/renewing certs.
  certbot:
    image: certbot/certbot
    container_name: saymed_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    profiles:
      - certbot   # only started explicitly: docker compose --profile certbot run certbot <args>

# ── Named volumes ────────────────────────────────────────────────────────────
volumes:
  saymed_pg:
  saymed_redis:
  saymed_uploads:
  saymed_transcripts:
  certbot_www:
  certbot_certs:

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  saymed_net:
    driver: bridge
