# ──────────────────────────────────────────────────────────────────────────────
# Nginx reverse proxy — production
#
# Responsibilities:
#   - HTTP (80):  serve ACME challenge for Certbot, redirect everything else → HTTPS
#   - HTTPS (443): terminate TLS, proxy /api/* → api:8000, everything else → web:80
# ──────────────────────────────────────────────────────────────────────────────

# Upstream services (Docker DNS resolves these by service name)
upstream api_backend {
    server api:8000;
}

upstream web_frontend {
    server web:80;
}

# ── HTTP — only used for Let's Encrypt ACME challenge + redirect ──────────────
server {
    listen 80;
    server_name ${DOMAIN};

    # Let Certbot serve its challenge files
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name ${DOMAIN};

    # TLS certificates issued by Certbot
    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;

    # Modern TLS settings (Mozilla Intermediate compatibility)
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS — tell browsers to only use HTTPS for 1 year
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Security headers
    add_header X-Frame-Options           SAMEORIGIN always;
    add_header X-Content-Type-Options    nosniff    always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Increase body size limit for audio file uploads
    client_max_body_size 200M;

    # ── API proxy ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api_backend;
        proxy_http_version 1.1;

        # Standard proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass through the request-id header (frontend sets it; backend reads it)
        proxy_set_header X-Request-Id      $http_x_request_id;

        # Timeouts — generous for long-running AI pipeline status polls
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 10s;
    }

    # ── Frontend static files ─────────────────────────────────────────────────
    location / {
        proxy_pass         http://web_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
