# ──────────────────────────────────────────────────────────────────────────────
# Nginx reverse proxy — production (no TLS)
#
# Use this config with docker-compose.prod-no-tls.yml when you do not yet have
# a domain name or TLS certificates.  Serves plain HTTP on port 80 only.
#
# Responsibilities:
#   - HTTP (80): proxy /api/* → api:8000, everything else → web:80
#
# When you obtain a domain and TLS certificates, switch to:
#   docker-compose.prod.yml  +  nginx/nginx.conf
# ──────────────────────────────────────────────────────────────────────────────

# Upstream services (Docker DNS resolves these by service name)
upstream api_backend {
    server api:8000;
}

upstream web_frontend {
    server web:80;
}

# ── HTTP ──────────────────────────────────────────────────────────────────────
server {
    listen 80;

    # Accept any IP address or hostname — no domain required
    server_name _;

    # Security headers (subset — HSTS omitted since we're not on HTTPS)
    add_header X-Frame-Options        SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff    always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Increase body size limit for audio file uploads
    client_max_body_size 200M;

    # Let Certbot serve its ACME challenge files (used for TLS bootstrapping)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── API proxy ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api_backend;
        proxy_http_version 1.1;

        # Standard proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass through the request-id header (frontend sets it; backend reads it)
        proxy_set_header X-Request-Id      $http_x_request_id;

        # Timeouts — generous for long-running AI pipeline status polls
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout 10s;
    }

    # ── Frontend static files ─────────────────────────────────────────────────
    location / {
        proxy_pass         http://web_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
